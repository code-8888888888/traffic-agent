# traffic-agent configuration
# Install to: /etc/traffic-agent/config.yaml
#
# All fields are optional — uncommented values show the defaults.

# Network interface to attach TC eBPF programs to.
interface: enp0s1

# TCP ports to capture. Traffic on any other port is ignored at the BPF level.
ports:
  - 80    # HTTP
  - 443   # HTTPS
  - 8080  # HTTP alternate
  - 8443  # HTTPS alternate

# -----------------------------------------------------------------------
# Traffic filtering (all rules are ANDed; empty = match everything)
# -----------------------------------------------------------------------
filter:
  # Capture only from these source IPs (CIDR not yet supported, use exact IPs).
  # src_ips:
  #   - 10.0.0.1

  # Capture only traffic destined for these IPs.
  # dst_ips:
  #   - 93.184.216.34

  # Limit by source port.
  # src_ports: []

  # Limit by destination port (e.g. only HTTP, not HTTPS).
  # dst_ports:
  #   - 80

  # Limit by process IDs.
  # pids:
  #   - 1234
  #   - 5678

  # Limit by process names (matched against /proc/<pid>/comm).
  # processes:
  #   - curl
  #   - nginx

# -----------------------------------------------------------------------
# Output / logging
# -----------------------------------------------------------------------
output:
  # Write JSON events to stdout.
  stdout: false

  # Write JSON events to a rotating log file.
  file: events.json

  # Maximum file size before rotation (megabytes).
  max_size_mb: 100

  # Maximum age of retained log files (days).
  max_age_days: 7

  # Maximum number of old rotated files to keep.
  max_backups: 3

  # Gzip-compress rotated files.
  compress: false

# -----------------------------------------------------------------------
# Browser auto-configuration
# -----------------------------------------------------------------------
browser:
  # Automatically disable QUIC/HTTP3 in detected browsers so all HTTPS
  # traffic goes through HTTP/2 over TLS (interceptable by NSS uprobes).
  # The agent writes user.js to Firefox profiles on startup and removes
  # it on shutdown. Firefox must be (re)started after the agent for this
  # to take effect. Default: true when tls.enabled is true.
  disable_quic: true

# -----------------------------------------------------------------------
# TLS / SSL plaintext interception via eBPF uprobes
# -----------------------------------------------------------------------
tls:
  # Enable SSL_read / SSL_write uprobe interception.
  enabled: true

  # Attach only to these PIDs. Empty = attach to all processes using libssl.
  # pids:
  #   - 1234

  # Attach only to processes with these comm names.
  # processes:
  #   - nginx
  #   - python3

  # SSLKEYLOGFILE path for QUIC key extraction. Firefox must be started with
  # SSLKEYLOGFILE=/path/to/keylog.txt to write TLS secrets to this file.
  ssl_keylog_file: /home/ubuntu/quic-keylog.txt

  # Explicit path to libssl.so. Leave empty for auto-detection via
  # /proc/<pid>/maps (recommended).
  # libssl_path: /lib/x86_64-linux-gnu/libssl.so.3

  # BoringSSL support: for apps that bundle BoringSSL instead of linking
  # against the system libssl.so (e.g. Chromium, Electron, some Node.js builds).
  #
  # Three attachment modes are tried in order:
  #   1. Shared library (.so in path) — symbol lookup on the .so.
  #   2. Executable with symbols — ELF symbol table present; attach by name.
  #   3. Stripped executable — requires explicit ssl_write_offset / ssl_read_offset.
  #
  # Finding file offsets for a stripped binary:
  #   readelf -s <binary> | grep SSL_write   # if partially stripped
  #   nm <binary>         | grep SSL_write   # if full symbol table present
  #   # For fully stripped: use a debug build of the same version.
  #
  # boringssl_executables:
  #
  #   # Chromium snap (ARM64, stripped — replace offsets with your version's values):
  #   - path: /snap/chromium/current/usr/lib/chromium-browser/chrome
  #     process_name: chrome
  #     ssl_write_offset: 0x0  # file offset of SSL_write
  #     ssl_read_offset:  0x0  # file offset of SSL_read
  #
  #   # App with dynamic libboringssl.so (symbol lookup, no offsets needed):
  #   - path: /opt/myapp/lib/libboringssl.so
  #
  #   # Unstripped / debug build (symbol lookup works without offsets):
  #   - path: /usr/local/bin/myapp
  #     process_name: myapp

# -----------------------------------------------------------------------
# HTTP event streaming endpoint
# -----------------------------------------------------------------------
event_stream:
  # Expose a streaming HTTP endpoint for downstream consumers.
  enabled: false

  # TCP address to listen on.
  address: "127.0.0.1:8080"

  # HTTP path for the ndjson event stream.
  path: /events
